<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoOrigen Emprende</title>
<meta name="description" content="Conoce este emprendimiento en GeoOrigen Emprende">
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  --c:#8FBC5A;
  --cd:color-mix(in srgb,var(--c) 60%,#000);
  --cl:color-mix(in srgb,var(--c) 15%,transparent);
  --cll:color-mix(in srgb,var(--c) 7%,transparent);
  --negro:#090907;--blanco:#FAFAF6;
  --gris:#161611;--gris2:#1D1D16;--gris3:#232319;
  --borde:rgba(255,255,255,0.07);
  --txt:rgba(250,250,246,0.72);
  --txt-dim:rgba(250,250,246,0.32);
  /* fondo catálogo — se sobreescribe según fondo_catalogo */
  --cat-bg:var(--negro);
  --card-bg:var(--gris2);
  --card-borde:rgba(255,255,255,0.07);
  --card-txt:var(--blanco);
  --card-txt-dim:var(--txt);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--negro);color:var(--blanco);min-height:100vh;}

/* LOADER */
#loader{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;background:var(--negro);}
.spin{width:30px;height:30px;border:2px solid rgba(255,255,255,.07);border-top-color:var(--c);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.1rem;transition:background .35s,border-color .35s;border-bottom:1px solid transparent;}
#topbar.solid{background:rgba(9,9,7,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-color:var(--borde);}
.tb-back{display:flex;align-items:center;gap:.35rem;font-size:.78rem;color:var(--txt-dim);text-decoration:none;transition:color .2s;}
.tb-back:hover{color:rgba(250,250,246,.7);}
.tb-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tb-logo{font-size:.78rem;font-weight:500;color:var(--txt-dim);letter-spacing:.02em;}

/* ── HERO ── */
.hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(9,9,7,.18) 0%,rgba(9,9,7,.05) 35%,rgba(9,9,7,.78) 72%,var(--negro) 100%);}
.hero-tint{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 80%,var(--cl) 0%,transparent 70%);}
.hero-content{position:relative;z-index:2;width:100%;max-width:700px;margin:0 auto;padding:7rem 1.5rem 3.5rem;display:flex;flex-direction:column;align-items:center;text-align:center;}

/* Logo con anillos */
.logo-wrap{position:relative;width:104px;height:104px;margin-bottom:1.6rem;flex-shrink:0;}
.logo-ring1{position:absolute;inset:-6px;border-radius:50%;border:1.5px solid var(--c);opacity:.4;}
.logo-ring2{position:absolute;inset:-14px;border-radius:50%;border:1px solid var(--c);opacity:.15;}
.logo-ring3{position:absolute;inset:-24px;border-radius:50%;border:1px solid var(--c);opacity:.06;}
.logo-img{width:100%;height:100%;border-radius:50%;object-fit:cover;position:relative;z-index:1;}
.logo-ph{width:100%;height:100%;border-radius:50%;background:var(--cl);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:2.8rem;position:relative;z-index:1;}

.hero-eyebrow{display:inline-flex;align-items:center;gap:.4rem;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--c);margin-bottom:.8rem;opacity:.9;}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';flex:1;height:1px;width:20px;background:var(--c);opacity:.3;}
.hero-name{font-size:clamp(2rem,8vw,3.5rem);font-weight:600;line-height:1.03;letter-spacing:-.035em;margin-bottom:.6rem;}
.hero-city{display:inline-flex;align-items:center;gap:.45rem;font-size:.78rem;color:var(--txt-dim);margin-bottom:1.1rem;}
.hero-city-dot{width:4px;height:4px;border-radius:50%;background:var(--c);}
.hero-desc{font-size:.91rem;color:var(--txt);line-height:1.8;max-width:480px;margin-bottom:1.8rem;}

/* Redes sociales */
.socials{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;}
.soc{display:inline-flex;align-items:center;gap:.38rem;padding:.46rem .9rem;border-radius:50px;font-size:.76rem;font-weight:500;text-decoration:none;border:1px solid;transition:filter .2s,transform .15s;backdrop-filter:blur(8px);}
.soc:hover{filter:brightness(1.25);transform:translateY(-1px);}
.soc-wa{color:#25d366;border-color:rgba(37,211,102,.22);background:rgba(37,211,102,.07);}
.soc-ig{color:#e1306c;border-color:rgba(225,48,108,.22);background:rgba(225,48,108,.07);}
.soc-fb{color:#4b8df8;border-color:rgba(75,141,248,.22);background:rgba(75,141,248,.07);}
.soc-tk{color:#ff2d55;border-color:rgba(255,45,85,.22);background:rgba(255,45,85,.07);}

/* Scroll hint */
.scroll-hint{margin-top:2.5rem;display:flex;flex-direction:column;align-items:center;gap:.4rem;color:var(--txt-dim);animation:bob 2.2s ease-in-out infinite;}
.scroll-hint span{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;}
.scroll-hint svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}

/* ── CATÁLOGO ── */
.catalogo{max-width:1160px;margin:0 auto;padding:2.5rem 1rem 8rem;}

.cat-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.4rem;gap:.5rem;flex-wrap:wrap;padding:0 .25rem;}
.cat-title{font-size:1.1rem;font-weight:600;letter-spacing:-.02em;}
.cat-count{font-size:.75rem;color:var(--txt-dim);}

/* Filtros de categoría */
.cat-bar{display:flex;gap:.4rem;overflow-x:auto;padding:.2rem .25rem .5rem;margin-bottom:1.6rem;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:.38rem .85rem;border-radius:50px;font-size:.73rem;font-weight:500;cursor:pointer;border:1px solid var(--borde);background:transparent;color:var(--txt-dim);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.cat-chip.on{background:var(--c);color:#09090A;border-color:var(--c);}
.cat-chip:not(.on):hover{border-color:rgba(255,255,255,.18);color:rgba(250,250,246,.65);}

/* Fondos del catálogo */
.catalogo{background:var(--cat-bg);}
body.fondo-claro{--cat-bg:#F5F5F0;--card-bg:#FFFFFF;--card-borde:rgba(0,0,0,0.08);--card-txt:#1A1A14;--card-txt-dim:rgba(26,26,20,0.5);}
body.fondo-claro .cat-title{color:#1A1A14;}
body.fondo-claro .cat-count{color:rgba(26,26,20,0.4);}
body.fondo-claro .cat-chip:not(.on){color:rgba(26,26,20,0.45);border-color:rgba(0,0,0,0.12);}
body.fondo-claro .cat-chip:not(.on):hover{color:rgba(26,26,20,0.7);border-color:rgba(0,0,0,0.2);}
body.fondo-claro .foot{color:rgba(26,26,20,0.35);}
body.fondo-color,
body.fondo-color-suave{--cat-bg:color-mix(in srgb,var(--c) 10%,#0A0A08);--card-bg:color-mix(in srgb,var(--c) 7%,#1D1D16);--card-borde:color-mix(in srgb,var(--c) 18%,transparent);}
body.fondo-color-medio{--cat-bg:color-mix(in srgb,var(--c) 25%,#0A0A08);--card-bg:color-mix(in srgb,var(--c) 15%,#1D1D16);--card-borde:color-mix(in srgb,var(--c) 30%,transparent);}
body.fondo-color-intenso{--cat-bg:color-mix(in srgb,var(--c) 50%,#0A0A08);--card-bg:color-mix(in srgb,var(--c) 25%,#0A0A08);--card-borde:color-mix(in srgb,var(--c) 45%,transparent);}

/* Grid de productos */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:.75rem;}
.card{background:var(--card-bg);border:1px solid var(--card-borde);border-radius:14px;cursor:pointer;display:flex;flex-direction:column;transition:border-color .25s,transform .25s,box-shadow .25s;overflow:hidden;}
.card:hover{border-color:color-mix(in srgb,var(--c) 55%,transparent);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.25);}
.card-img-wrap{aspect-ratio:3/4;overflow:hidden;position:relative;}
.card-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease;}
.card:hover .card-img{transform:scale(1.06);}
.card-ph{width:100%;height:100%;background:var(--cll);display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.card-info{padding:.85rem;}
.card-nom{font-size:.83rem;font-weight:500;line-height:1.35;margin-bottom:.28rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--card-txt);}
.card-price{font-size:.82rem;font-weight:600;color:var(--c);margin-bottom:.4rem;}
.card-tags{display:flex;flex-wrap:wrap;gap:.22rem;}
.tag{font-size:.58rem;padding:.13rem .45rem;border-radius:4px;background:var(--cll);color:var(--c);border:1px solid color-mix(in srgb,var(--c) 18%,transparent);}

.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:4.5rem 1rem;color:var(--txt-dim);gap:.6rem;}
.empty-icon{font-size:2rem;opacity:.3;}

/* ── MODAL (bottom sheet) ── */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.overlay.open{display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:640px){.overlay.open{align-items:center;}}
.sheet{background:var(--gris);border:1px solid var(--borde);width:100%;max-width:600px;max-height:95svh;overflow-y:auto;border-radius:22px 22px 0 0;animation:slideUp .28s cubic-bezier(.22,.61,.36,1);}
@media(min-width:640px){.sheet{border-radius:20px;max-height:90vh;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-drag{width:36px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:10px auto 0;cursor:ns-resize;}
.sheet-close-row{display:flex;justify-content:flex-end;padding:.5rem .8rem 0;}
.sheet-close{background:rgba(255,255,255,.1);border:none;color:var(--txt-dim);width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.sheet-close:hover{background:rgba(255,255,255,.18);}
.sheet-img-wrap{overflow:hidden;max-height:260px;}
.sheet-img{width:100%;max-height:260px;object-fit:cover;display:block;}
.sheet-img-ph{height:180px;background:var(--cll);display:flex;align-items:center;justify-content:center;font-size:4rem;}
.gallery-strip{display:flex;gap:6px;padding:8px 1.25rem 0;overflow-x:auto;scrollbar-width:none;}
.gallery-strip::-webkit-scrollbar{display:none;}
.gallery-strip img{width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:zoom-in;border:1.5px solid transparent;transition:border-color .2s;}
.gallery-strip img:hover{border-color:var(--c);}
.sheet-body{padding:1.25rem;}
.sheet-name{font-size:1.1rem;font-weight:600;letter-spacing:-.015em;margin-bottom:.28rem;}
.sheet-price{font-size:1.25rem;font-weight:600;color:var(--c);margin-bottom:.85rem;}
.sheet-desc{font-size:.85rem;color:var(--txt);line-height:1.78;margin-bottom:1.1rem;}
.sheet-attrs{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;background:var(--gris2);border-radius:12px;padding:.9rem 1rem;margin-bottom:1.1rem;}
.s-attr label{font-size:.59rem;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-dim);display:block;margin-bottom:.18rem;}
.s-attr p{font-size:.82rem;color:rgba(250,250,246,.8);}
.sheet-wa{display:flex;align-items:center;justify-content:center;gap:.55rem;background:#1db954;background:#25d366;color:#fff;padding:.95rem 1.5rem;border-radius:12px;font-size:.9rem;font-weight:500;text-decoration:none;transition:filter .2s;}
.sheet-wa:hover{filter:brightness(1.08);}

/* ── FAB COMPARTIR ── */
.fab{position:fixed;bottom:1.4rem;right:1.2rem;z-index:300;display:flex;flex-direction:column;align-items:flex-end;gap:.45rem;}
.fab-menu{display:flex;flex-direction:column;gap:.38rem;align-items:flex-end;opacity:0;pointer-events:none;transform:translateY(8px);transition:all .22s cubic-bezier(.22,.61,.36,1);}
.fab-menu.open{opacity:1;pointer-events:all;transform:translateY(0);}
.fab-item{display:flex;align-items:center;gap:.45rem;padding:.52rem 1rem;border-radius:50px;border:1px solid var(--borde);background:rgba(22,22,17,.92);backdrop-filter:blur(14px);color:rgba(250,250,246,.78);font-size:.78rem;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .18s;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.fab-item:hover{background:rgba(35,35,25,.95);color:var(--blanco);}
.fab-btn{display:flex;align-items:center;gap:.42rem;padding:.72rem 1.2rem;border-radius:50px;border:none;cursor:pointer;font-size:.84rem;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--c);color:#09090A;box-shadow:0 4px 22px var(--cl);transition:filter .2s,transform .15s;}
.fab-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
.fab-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── FOOTER SIMPLE ── */
.foot{text-align:center;padding:1.5rem;font-size:.72rem;color:var(--txt-dim);}
.foot a{color:var(--c);text-decoration:none;opacity:.7;}

@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .sheet-attrs{grid-template-columns:1fr;}
}
@media(min-width:900px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
}
</style>
</head>

// Leer slug desde path /emprendedor/:slug o query ?e=slug o ?id=uuid
const pathMatch = location.pathname.match(/\/emprendedor\/([^\/]+)\/?$/);

const slug      = pathSlug || qp.get('e');
const idParam   = qp.get('id');

let emp = null, prods = [], catActiva = '', fabOpen = false;

function sbGet(path) {
  return fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPA_ANON, Authorization: `Bearer ${SUPA_ANON}` }
  }).then(r => r.json());
}

// ── CARGAR ────────────────────────────────────────────────────────────────────
async function cargar() {
  let filter;
  if (slug)         filter = `slug=eq.${encodeURIComponent(slug)}&activo=eq.true`;
  else if (idParam) filter = `id=eq.${idParam}&activo=eq.true`;
  else { mostrarError('URL inválida'); return; }

  const [empArr, prodArr] = await Promise.all([
    sbGet(`emprendedores?${filter}&select=*`),
    sbGet('emprende_productos?activo=eq.true&select=*')
  ]);

  if (!empArr || !empArr.length) { mostrarError('Este emprendimiento no está disponible.'); return; }
  emp   = empArr[0];
  prods = (prodArr || []).filter(p => p.emprendedor_id === emp.id);

  // Color personalizado
  const color = emp.color_primario || '#8FBC5A';
  document.documentElement.style.setProperty('--c', color);

  // Color de marcos
  if (emp.color_marco) {
    const m = emp.color_marco;
    const r = parseInt(m.slice(1,3),16), g = parseInt(m.slice(3,5),16), b = parseInt(m.slice(5,7),16);
    document.documentElement.style.setProperty('--card-borde', `rgba(${r},${g},${b},0.45)`);
  }

  // Fondo del catálogo
  const fondo = emp.fondo_catalogo || 'oscuro';
  const fondoClases = {'claro':'fondo-claro','color':'fondo-color','color-suave':'fondo-color-suave','color-medio':'fondo-color-medio','color-intenso':'fondo-color-intenso'};
  if (fondo === 'custom' && emp.fondo_color) {
    document.querySelector('.catalogo') && (document.querySelector('.catalogo').style.background = emp.fondo_color);
    document.documentElement.style.setProperty('--cat-bg', emp.fondo_color);
  } else if (fondoClases[fondo]) {
    document.body.classList.add(fondoClases[fondo]);
  }

  document.title = `${emp.nombre_emprendimiento} — GeoOrigen Emprende`;
  document.querySelector('meta[name="description"]').content =
    `${emp.descripcion || emp.nombre_emprendimiento} — GeoOrigen Emprende`;

  renderHero();
  renderCats();
  renderGrid();

  document.getElementById('loader').style.display = 'none';
  document.getElementById('catalogoSection').style.display = '';
  document.getElementById('foot').style.display = '';
  document.getElementById('fab').style.display = '';

  // Scroll listener para topbar + ocultar scroll hint
  window.addEventListener('scroll', () => {
    document.getElementById('topbar').classList.toggle('solid', window.scrollY > 60);
    if (window.scrollY > 80) document.getElementById('scrollHint').style.opacity = '0';
    else document.getElementById('scrollHint').style.opacity = '';
    // Cerrar FAB al hacer scroll
    if (fabOpen) toggleFab();
  }, { passive: true });

  // Cerrar FAB al hacer click fuera
  document.addEventListener('click', e => {
    if (fabOpen && !document.getElementById('fab').contains(e.target)) toggleFab();
  });
}

// ── HERO ──────────────────────────────────────────────────────────────────────
function renderHero() {
  // Banner de fondo
  const banner = emp.banner_url || (prods[0]?.foto_principal_url) || '';
  const bg = document.getElementById('heroBg');
  if (banner) {
    bg.style.backgroundImage = `url('${banner}')`;
  } else {
    bg.style.background = `linear-gradient(140deg,
      color-mix(in srgb,${emp.color_primario||'#8FBC5A'} 35%,#09090A) 0%,
      #09090A 100%)`;
  }

  // Logo
  const logoEl = document.getElementById('heroLogo');
  if (emp.logo_url) {
    const img = document.createElement('img');
    img.className = 'logo-img';
    img.alt = `Logo de ${emp.nombre_emprendimiento}`;
    img.src = emp.logo_url;
    logoEl.replaceChildren(img);
  } else {
    logoEl.innerHTML = `<div class="logo-ph">🏪</div>`;
  }

  document.getElementById('heroNombre').textContent = emp.nombre_emprendimiento;

  if (emp.ciudad) {
    document.getElementById('heroCityTxt').textContent = emp.ciudad;
    document.getElementById('heroCity').style.display = '';
  }
  if (emp.descripcion) {
    document.getElementById('heroDesc').textContent = emp.descripcion;
    document.getElementById('heroDesc').style.display = '';
  }

  // Redes sociales
  const links = [];
  if (emp.whatsapp)  links.push(`<a class="soc soc-wa" href="https://wa.me/${emp.whatsapp}" target="_blank" rel="noopener">💬 WhatsApp</a>`);
  if (emp.instagram) links.push(`<a class="soc soc-ig" href="https://instagram.com/${emp.instagram.replace('@','')}" target="_blank" rel="noopener">📸 Instagram</a>`);
  if (emp.facebook)  links.push(`<a class="soc soc-fb" href="${emp.facebook.startsWith('http')?emp.facebook:'https://facebook.com/'+emp.facebook}" target="_blank" rel="noopener">👍 Facebook</a>`);
  if (emp.tiktok)    links.push(`<a class="soc soc-tk" href="https://tiktok.com/@${emp.tiktok.replace('@','')}" target="_blank" rel="noopener">🎵 TikTok</a>`);
  document.getElementById('heroSocials').innerHTML = links.join('');
}

// ── CATEGORÍAS ────────────────────────────────────────────────────────────────
function renderCats() {
  const cats = [...new Set(prods.map(p => p.categoria))].filter(Boolean);
  const bar  = document.getElementById('catBar');
  if (cats.length < 2) { bar.style.display = 'none'; return; }
  bar.innerHTML = `<button class="cat-chip on" onclick="filtrar('',this)">Todos</button>`
    + cats.map(c => `<button class="cat-chip" onclick="filtrar('${c}',this)">${CAT[c]||c}</button>`).join('');
  document.getElementById('catTitle').textContent = `Catálogo de ${emp.nombre_emprendimiento}`;
}

function filtrar(cat, btn) {
  catActiva = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
}

// ── GRID ──────────────────────────────────────────────────────────────────────
function renderGrid() {
  const lista = catActiva ? prods.filter(p => p.categoria === catActiva) : prods;
  const n = lista.length;
  document.getElementById('catCount').textContent = n
    ? `${n} producto${n!==1?'s':''}`
    : '';
  if (!n) {
    document.getElementById('prodGrid').innerHTML =
      `<div class="empty"><div class="empty-icon">🛍️</div><span>Sin productos en esta categoría</span></div>`;
    return;
  }
  document.getElementById('prodGrid').innerHTML = lista.map((p, i) => {
    const idx    = prods.indexOf(p);
    const precio = p.precio ? `$${Number(p.precio).toLocaleString('es-CO')}` : 'Consultar precio';
    const tags   = [
      p.personalizable ? '<span class="tag">✨ Personalizable</span>' : '',
      p.hace_envios    ? '<span class="tag">🚚 Envíos</span>' : '',
      p.disponibilidad === 'inmediata' ? '<span class="tag">⚡ Inmediato</span>' : '',
    ].filter(Boolean).join('');
    return `<div class="card" onclick="abrirModal(${idx})">
      <div class="card-img-wrap">
        ${p.foto_principal_url
          ? `<img class="card-img" src="${p.foto_principal_url}" alt="${p.nombre}" loading="${i<4?'eager':'lazy'}">`
          : `<div class="card-ph">📦</div>`}
      </div>
      <div class="card-info">
        <div class="card-nom">${p.nombre}</div>
        <div class="card-price">${precio}</div>
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function abrirModal(idx) {
  const p     = prods[idx];
  const fotos = [p.foto_principal_url, ...(p.galeria_urls||[])].filter(Boolean);

  document.getElementById('sheetMedia').innerHTML = fotos.length
    ? `<div class="sheet-img-wrap"><img class="sheet-img" src="${fotos[0]}" alt="${p.nombre}"></div>`
    : `<div class="sheet-img-ph">📦</div>`;

  const gal = document.getElementById('sheetGallery');
  if (fotos.length > 1) {
    gal.style.display = 'flex';
    gal.replaceChildren(...fotos.slice(1).map(u => {
      const img = document.createElement('img');
      img.src = u; img.loading = 'lazy';
      img.addEventListener('click', () => window.open(u, '_blank'));
      return img;
    }));
  } else { gal.style.display = 'none'; }

  document.getElementById('sheetName').textContent  = p.nombre;
  document.getElementById('sheetPrice').textContent = p.precio ? `$${Number(p.precio).toLocaleString('es-CO')}` : 'Consultar precio';

  const desc = document.getElementById('sheetDesc');
  if (p.descripcion) { desc.textContent = p.descripcion; desc.style.display = ''; }
  else desc.style.display = 'none';

  const attrs = [
    p.disponibilidad     ? {l:'Disponibilidad', v: p.disponibilidad==='inmediata'?'⚡ Entrega inmediata':p.disponibilidad==='pedido'?'🔧 Bajo pedido':'Inmediata o pedido'} : null,
    p.personalizable     ? {l:'Personalización', v: p.que_personalizar||'Sí, personalizable'} : null,
    p.tiempo_elaboracion ? {l:'Elaboración', v: p.tiempo_elaboracion} : null,
    p.hace_envios        ? {l:'Envíos', v: p.tiempo_entrega||'Disponible'} : null,
    p.ciudad             ? {l:'Ciudad', v: p.ciudad} : null,
    p.categoria          ? {l:'Categoría', v: CAT[p.categoria]||p.categoria} : null,
  ].filter(Boolean);
  document.getElementById('sheetAttrs').innerHTML = attrs.map(a =>
    `<div class="s-attr"><label>${a.l}</label><p>${a.v}</p></div>`).join('');

  const waEl = document.getElementById('sheetWA');
  if (emp.whatsapp) {
    const msg = encodeURIComponent(`Hola ${emp.nombre_emprendimiento} 👋, vi tu producto "${p.nombre}" en GeoOrigen Emprende y me interesa 🛍️`);
    waEl.href = `https://wa.me/${emp.whatsapp}?text=${msg}`;
    waEl.style.display = 'flex';
  } else { waEl.style.display = 'none'; }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── FAB COMPARTIR ─────────────────────────────────────────────────────────────
function miUrl() {
  // Preferir geoorigen.com/emprendedor/slug como URL canónica
  if (emp.slug) return `https://geoorigen.com/emprendedor/${emp.slug}`;
  if (slug)     return `${location.origin}${location.pathname.replace(/\/emprendedor\/.*$/,'')}?e=${slug}`;
  return `${location.origin}${location.pathname}?id=${emp.id}`;
}

function toggleFab() {
  fabOpen = !fabOpen;
  document.getElementById('fabMenu').classList.toggle('open', fabOpen);
  document.getElementById('fabBtn').style.background = fabOpen ? 'var(--cd)' : 'var(--c)';
}

function compartirNativo() {
  const url = miUrl();
  if (navigator.share) {
    navigator.share({
      title: emp.nombre_emprendimiento,
      text: `Conoce ${emp.nombre_emprendimiento} en GeoOrigen Emprende 🛍️`,
      url
    }).catch(()=>{});
  } else { copiarEnlace(); }
  if (fabOpen) toggleFab();
}

let copyT;
function copiarEnlace() {
  navigator.clipboard.writeText(miUrl()).then(() => {
    const btn = document.getElementById('fabCopy');
    btn.textContent = '✓ ¡Copiado!';
    clearTimeout(copyT);
    copyT = setTimeout(() => {
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar enlace`;
    }, 2500);
  }).catch(()=>{});
  if (fabOpen) toggleFab();
}

function mostrarError(msg) {
  document.getElementById('loader').innerHTML = `
    <div style="text-align:center;padding:2rem;max-width:320px">
      <div style="font-size:2.5rem;margin-bottom:1rem;opacity:.4">😕</div>
      <p style="color:var(--txt-dim);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem">${msg}</p>
      <a href="https://geoorigen.com/emprende" style="color:var(--c);font-size:.85rem;text-decoration:none;border:1px solid var(--cl);padding:.5rem 1.2rem;border-radius:50px;">
        ← Volver a Emprende
      </a>
    </div>`;
}

cargar();
</script>
</body>
</html>
