<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emprendedor — GeoOrigen Emprende</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--verde:#2D5016;--menta:#8FBC5A;--acento:#E8A020;--negro:#1A1A14;--blanco:#FAFAF6;--gris:#232318;--gris2:#2e2e22;--borde:rgba(143,188,90,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--negro);color:var(--blanco);min-height:100vh;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(26,26,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--borde);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:.95rem;font-weight:500;color:var(--menta);text-decoration:none;}
.nav-logo span{color:rgba(250,250,246,.35);font-size:.78rem;font-weight:400;margin-left:.4rem;}
.nav-back{font-size:.78rem;color:rgba(250,250,246,.45);text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:color .2s;}
.nav-back:hover{color:var(--menta);}

/* HERO EMPRENDEDOR */
.emp-hero{background:linear-gradient(135deg,rgba(45,80,22,.35) 0%,rgba(26,26,20,0) 70%);border-bottom:1px solid var(--borde);padding:3rem 2rem 2.5rem;}
.emp-hero-inner{max-width:900px;margin:0 auto;display:flex;align-items:flex-start;gap:2rem;flex-wrap:wrap;}
.emp-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:2px solid var(--borde);background:var(--gris2);flex-shrink:0;}
.emp-logo-ph{width:90px;height:90px;border-radius:50%;background:rgba(143,188,90,.1);border:2px solid var(--borde);display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0;}
.emp-info{flex:1;min-width:0;}
.emp-nombre{font-size:1.75rem;font-weight:500;line-height:1.15;margin-bottom:.4rem;}
.emp-ciudad{font-size:.8rem;color:rgba(250,250,246,.4);margin-bottom:.75rem;}
.emp-desc{font-size:.88rem;color:rgba(250,250,246,.65);line-height:1.65;max-width:580px;margin-bottom:1.1rem;}
.emp-socials{display:flex;flex-wrap:wrap;gap:.6rem;}
.soc-btn{display:flex;align-items:center;gap:.4rem;padding:.45rem .9rem;border-radius:6px;font-size:.78rem;font-weight:500;text-decoration:none;transition:all .2s;}
.soc-wa{background:rgba(37,211,102,.12);color:#25d366;border:1px solid rgba(37,211,102,.25);}
.soc-wa:hover{background:rgba(37,211,102,.22);}
.soc-ig{background:rgba(228,64,95,.1);color:#e4405f;border:1px solid rgba(228,64,95,.22);}
.soc-ig:hover{background:rgba(228,64,95,.2);}
.soc-fb{background:rgba(24,119,242,.1);color:#1877f2;border:1px solid rgba(24,119,242,.22);}
.soc-fb:hover{background:rgba(24,119,242,.2);}

/* SHARE BOX */
.share-box{max-width:900px;margin:1.5rem auto 0;background:rgba(143,188,90,.06);border:1px solid var(--borde);border-radius:10px;padding:.85rem 1.2rem;display:flex;align-items:center;gap:.85rem;flex-wrap:wrap;}
.share-label{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(250,250,246,.35);flex-shrink:0;}
.share-url{font-size:.78rem;color:rgba(250,250,246,.5);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.share-copy{background:none;border:1px solid var(--borde);color:var(--menta);padding:.35rem .85rem;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.73rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.share-copy:hover{background:rgba(143,188,90,.1);}

/* PRODUCTOS */
.section{max-width:900px;margin:0 auto;padding:2rem;}
.section-title{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(250,250,246,.3);margin-bottom:1.25rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1rem;}
.card{background:var(--gris2);border:1px solid var(--borde);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;}
.card:hover{border-color:rgba(143,188,90,.4);transform:translateY(-2px);}
.card-img{width:100%;height:180px;object-fit:cover;background:var(--gris);display:block;}
.card-img-ph{width:100%;height:180px;background:rgba(143,188,90,.06);display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.card-body{padding:1rem;}
.card-nombre{font-size:.92rem;font-weight:500;margin-bottom:.35rem;}
.card-precio{font-size:.85rem;color:var(--acento);margin-bottom:.55rem;}
.card-pills{display:flex;flex-wrap:wrap;gap:.35rem;}
.pill{font-size:.6rem;padding:.2rem .55rem;border-radius:3px;border:1px solid rgba(143,188,90,.2);color:rgba(250,250,246,.5);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--gris2);border:1px solid var(--borde);border-radius:16px;width:100%;max-width:680px;margin:auto;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--borde);}
.modal-title{font-size:1rem;font-weight:500;}
.modal-close{background:none;border:none;color:rgba(250,250,246,.4);font-size:1.3rem;cursor:pointer;line-height:1;}
.modal-body{padding:1.5rem;}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.25rem;}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.25rem;}
.dg-item label{font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;color:rgba(250,250,246,.35);display:block;margin-bottom:.2rem;}
.dg-item p{font-size:.86rem;color:rgba(250,250,246,.8);}
.detail-desc{font-size:.86rem;color:rgba(250,250,246,.65);line-height:1.7;margin-bottom:1.25rem;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;background:#25d366;color:#fff;padding:.85rem 1.5rem;border-radius:8px;font-size:.9rem;font-weight:500;text-decoration:none;transition:background .2s;}
.wa-btn:hover{background:#1ebe5b;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:4rem 2rem;color:rgba(250,250,246,.22);}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;}

@media(max-width:600px){
  .emp-hero{padding:2rem 1.25rem 1.75rem;}
  .emp-nombre{font-size:1.35rem;}
  .section{padding:1.5rem 1.25rem;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="emprende.html" class="nav-logo">GeoOrigen <span>Emprende</span></a>
  <a href="emprende.html" class="nav-back">← Ver todos los emprendedores</a>
</nav>

<!-- HERO (se llena con JS) -->
<div class="emp-hero" id="heroWrap" style="display:none">
  <div class="emp-hero-inner">
    <div id="heroLogo"></div>
    <div class="emp-info">
      <div class="emp-nombre" id="heroNombre"></div>
      <div class="emp-ciudad" id="heroCiudad"></div>
      <div class="emp-desc" id="heroDesc"></div>
      <div class="emp-socials" id="heroSocials"></div>
    </div>
  </div>
  <div class="share-box" style="padding-left:0;padding-right:0;background:none;border:none;">
    <span class="share-label">Comparte</span>
    <span class="share-url" id="shareUrl"></span>
    <button class="share-copy" onclick="copiarEnlace()">Copiar enlace</button>
  </div>
</div>

<!-- LOADING / ERROR -->
<div class="empty" id="loadingMsg"><div class="empty-icon">⏳</div><p>Cargando...</p></div>
<div class="empty" id="errorMsg" style="display:none"><div class="empty-icon">😕</div><p id="errorTxt">No se encontró el emprendimiento.</p></div>

<!-- PRODUCTOS -->
<div class="section" id="prodSection" style="display:none">
  <div class="section-title" id="prodCount"></div>
  <div class="grid" id="prodGrid"></div>
</div>

<!-- MODAL PRODUCTO -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="mNombre"></div>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="gallery" id="mGallery"></div>
      <div class="detail-desc" id="mDesc"></div>
      <div class="detail-grid" id="mGrid"></div>
      <a id="mWA" class="wa-btn" href="#" target="_blank" rel="noopener">
        💬 Contactar por WhatsApp
      </a>
    </div>
  </div>
</div>

<script>
const SUPA_URL  = 'https://kubcmjbiaithfvozmdul.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1YmNtamJpYWl0aGZ2b3ptZHVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjI0MzAsImV4cCI6MjA4OTE5ODQzMH0.GoT7vRuwEv7P2mJU1hqIzAXnaNdm4ji-DQM-2WU7WOM';

const CAT = {detalles:'🎁 Detalles',arte:'🎨 Arte',peluches:'🧸 Peluches',termos:'☕ Termos',decoracion:'🕯️ Decoración',joyeria:'💍 Joyería',flores:'🌸 Flores',eventos:'🎉 Eventos',manualidades:'✨ Manualidades',papeleria:'📚 Papelería',reposteria:'🍰 Repostería',san_valentin:'❤️ San Valentín',dia_madre:'👩 Día Madre',dia_padre:'👨 Día Padre',navidad:'🎄 Navidad',cumpleanos:'🎂 Cumpleaños'};

const params = new URLSearchParams(location.search);
const empId  = params.get('id');

let emprendedor = null;
let productos   = [];

async function cargar() {
  if (!empId) { mostrarError('URL inválida: falta el parámetro ?id='); return; }

  const [empRes, prodRes] = await Promise.all([
    fetch(`${SUPA_URL}/rest/v1/emprendedores?id=eq.${empId}&activo=eq.true&select=*`,
      { headers: { apikey: SUPA_ANON, Authorization: `Bearer ${SUPA_ANON}` } }),
    fetch(`${SUPA_URL}/rest/v1/emprende_productos?emprendedor_id=eq.${empId}&activo=eq.true&order=creado_en.desc&select=*`,
      { headers: { apikey: SUPA_ANON, Authorization: `Bearer ${SUPA_ANON}` } }),
  ]);

  const empData  = await empRes.json();
  const prodData = await prodRes.json();

  if (!empData.length) { mostrarError('Este emprendimiento no está disponible o no existe.'); return; }

  emprendedor = empData[0];
  productos   = prodData || [];

  document.title = `${emprendedor.nombre_emprendimiento} — GeoOrigen Emprende`;
  renderHero();
  renderProductos();
}

function renderHero() {
  // Logo
  document.getElementById('heroLogo').innerHTML = emprendedor.logo_url
    ? `<img src="${emprendedor.logo_url}" class="emp-logo" alt="Logo">`
    : `<div class="emp-logo-ph">🏪</div>`;

  document.getElementById('heroNombre').textContent = emprendedor.nombre_emprendimiento;
  document.getElementById('heroCiudad').textContent = emprendedor.ciudad ? `📍 ${emprendedor.ciudad}` : '';
  document.getElementById('heroDesc').textContent = emprendedor.descripcion || '';

  // Socials
  const soc = [];
  if (emprendedor.whatsapp) soc.push(`<a class="soc-btn soc-wa" href="https://wa.me/${emprendedor.whatsapp}" target="_blank" rel="noopener">💬 WhatsApp</a>`);
  if (emprendedor.instagram) soc.push(`<a class="soc-btn soc-ig" href="https://instagram.com/${emprendedor.instagram}" target="_blank" rel="noopener">📸 @${emprendedor.instagram}</a>`);
  if (emprendedor.facebook) soc.push(`<a class="soc-btn soc-fb" href="${emprendedor.facebook}" target="_blank" rel="noopener">👍 Facebook</a>`);
  document.getElementById('heroSocials').innerHTML = soc.join('');

  // Share URL
  const url = `${location.origin}${location.pathname}?id=${emprendedor.id}`;
  document.getElementById('shareUrl').textContent = url;

  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('heroWrap').style.display = '';
}

function renderProductos() {
  document.getElementById('prodCount').textContent = `${productos.length} producto${productos.length !== 1 ? 's' : ''}`;
  document.getElementById('prodGrid').innerHTML = productos.map((p, i) => {
    const precio = p.precio ? `$${Number(p.precio).toLocaleString('es-CO')}` : 'Consultar precio';
    const pills = [
      p.personalizable ? '<span class="pill">✨ Personalizable</span>' : '',
      p.hace_envios    ? '<span class="pill">🚚 Envíos</span>' : '',
      p.disponibilidad === 'inmediata' ? '<span class="pill">⚡ Inmediata</span>' : '<span class="pill">🔧 Bajo pedido</span>',
    ].filter(Boolean).join('');
    return `<div class="card" onclick="abrirModal(${i})">
      ${p.foto_principal_url
        ? `<img class="card-img" src="${p.foto_principal_url}" alt="${p.nombre}" loading="lazy">`
        : `<div class="card-img-ph">📦</div>`}
      <div class="card-body">
        <div class="card-nombre">${p.nombre}</div>
        <div class="card-precio">${precio}</div>
        <div class="card-pills">${pills}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('prodSection').style.display = '';
}

function abrirModal(idx) {
  const p = productos[idx];
  document.getElementById('mNombre').textContent = p.nombre;
  document.getElementById('mDesc').textContent = p.descripcion || '';

  // Galería
  const fotos = [p.foto_principal_url, ...(p.galeria_urls || [])].filter(Boolean);
  document.getElementById('mGallery').innerHTML = fotos.length
    ? fotos.map(u => `<img src="${u}" alt="${p.nombre}" onclick="window.open('${u}','_blank')">`).join('')
    : '';
  document.getElementById('mGallery').style.display = fotos.length ? '' : 'none';

  // Detalles
  const items = [
    p.precio ? { label: 'Precio', val: `$${Number(p.precio).toLocaleString('es-CO')}` } : null,
    p.disponibilidad ? { label: 'Disponibilidad', val: p.disponibilidad === 'inmediata' ? '⚡ Entrega inmediata' : p.disponibilidad === 'pedido' ? '🔧 Solo bajo pedido' : '⚡ Inmediata o bajo pedido' } : null,
    p.personalizable ? { label: 'Personalización', val: p.que_personalizar || 'Sí' } : null,
    p.tiempo_elaboracion ? { label: 'Tiempo elaboración', val: p.tiempo_elaboracion } : null,
    p.ciudad ? { label: 'Ciudad', val: p.ciudad } : null,
    p.hace_envios ? { label: 'Envíos', val: p.tiempo_entrega || 'Sí hace envíos' } : null,
  ].filter(Boolean);
  document.getElementById('mGrid').innerHTML = items.map(d =>
    `<div class="dg-item"><label>${d.label}</label><p>${d.val}</p></div>`
  ).join('');

  // WhatsApp
  const waNum = emprendedor.whatsapp || '';
  const msg = encodeURIComponent(`Hola, vi tu producto "${p.nombre}" en GeoOrigen Emprende y me gustaría más información.`);
  const waEl = document.getElementById('mWA');
  if (waNum) { waEl.href = `https://wa.me/${waNum}?text=${msg}`; waEl.style.display = 'flex'; }
  else { waEl.style.display = 'none'; }

  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
}

function mostrarError(msg) {
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('errorTxt').textContent = msg;
  document.getElementById('errorMsg').style.display = '';
}

function copiarEnlace() {
  const url = `${location.origin}${location.pathname}?id=${emprendedor.id}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.share-copy');
    btn.textContent = '¡Copiado!';
    setTimeout(() => btn.textContent = 'Copiar enlace', 2000);
  });
}

cargar();
</script>
</body>
</html>
